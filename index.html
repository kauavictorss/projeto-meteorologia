<!DOCTYPE html> <!-- AVISAR QUE ESTAMOS USANDO A VERSÃO MAIS NOVA DO HTML -->
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS para o Spinner -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./style.css">
    <title>DevClub - Previsão do Tempo</title>
</head>

<body>
    <div class="caixa-maior">

        <input class="input-cidade" placeholder="Digite a cidade">

        <button onclick="iniciarBusca()">
            <i class="bi bi-search lupa"></i>
            <div class="spinner-border spinner-border-sm text-light d-none" role="status" id="spinner">
                <span class="visually-hidden">Loading...</span>
            </div>
        </button>

        <div class="caixa-media">
            <h2 class="cidade">Digite uma cidade...</h2>

            <p class="tempo"></p>

            <img class="icone">
    
            <p class="umidade"></p>
        </div>
        <p class="versao">v1.0.0</p>
    </div>

    <script src="./index.js"></script>

</body>
</html>
